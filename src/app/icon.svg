<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ScriptStudio">
  <defs>
    <linearGradient id="ssGrad" x1="18" y1="9" x2="47" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f15a98"/>
      <stop offset="0.5" stop-color="#aa2e61"/>
      <stop offset="1" stop-color="#3d0f27"/>
    </linearGradient>
    <linearGradient id="penBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f15a98"/>
      <stop offset="1" stop-color="#7c1f49"/>
    </linearGradient>
  </defs>

  <!-- 背景タイル（参照画像の淡いグレー） -->
  <rect width="64" height="64" rx="13" fill="#f1f1f3"/>

  <!-- S / S（ピンク→濃紫グラデ） -->
  <g fill="url(#ssGrad)" font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
     font-weight="900" font-style="italic" font-size="37" text-anchor="middle">
    <text x="20.5" y="46">S</text>
    <text x="43.5" y="46">S</text>
  </g>

  <!-- 中央の区切り＝ペン（オリジナル性／対角配置） -->
  <g transform="rotate(29 32 32)">
    <!-- 軸（上だけ角丸・下は平らでペン先に接続） -->
    <path d="M28.4 41 L28.4 15 Q28.4 12 31.4 12 L32.6 12 Q35.6 12 35.6 15 L35.6 41 Z"
          fill="#ffffff" stroke="#3d0f27" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- グリップ帯（グラデ） -->
    <rect x="29.1" y="29.6" width="5.8" height="5.4" fill="url(#penBand)"/>
    <!-- ノック（頭） -->
    <rect x="30.3" y="9.0" width="3.4" height="3.4" rx="1.3" fill="#3d0f27"/>
    <!-- ペン先（コーン） -->
    <path d="M28.4 41 L35.6 41 L32 52.4 Z" fill="#ffffff" stroke="#3d0f27" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- ペン先・チップ -->
    <path d="M30.4 47.4 L33.6 47.4 L32 52.4 Z" fill="#3d0f27"/>
    <!-- スリット -->
    <line x1="32" y1="41.4" x2="32" y2="46.6" stroke="#3d0f27" stroke-width="1.1" stroke-linecap="round"/>
  </g>
</svg>
